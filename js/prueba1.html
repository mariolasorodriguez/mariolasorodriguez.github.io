<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<h1 id="titulo">Hola Mundo</h1>
<button class="botonazul">Azul</button>
<button class="botonrojo">Rojo</button>
<button class="botonamarillo">Amarillo</button>
<button class="botonverde">Verde</button>

<script>
    const titulo = document.getElementById('titulo');

    const botonAzul = document.querySelector(".botonazul");
    botonAzul.style.backgroundColor = "blue";
    botonAzul.style.color = "white";

    const botonRojo = document.querySelector(".botonrojo");
    botonRojo.style.backgroundColor = "red";
    botonRojo.style.color = "white";

    const botonAmarillo = document.querySelector(".botonamarillo");
    botonAmarillo.style.backgroundColor = "yellow";
    botonAmarillo.style.color = "white";

    const botonVerde = document.querySelector(".botonverde");
    botonAmarillo.style.backgroundColor = "green";
    botonAmarillo.style.color = "white";

    botonAzul.addEventListener("click", function() {
        titulo.style.color = "blue";
    });

    botonRojo.addEventListener("click", function() {
        titulo.style.color = "red";
    });

    botonAmarillo.addEventListener("click", function() {
        titulo.style.color = "yellow";
    });

    botonVerde.addEventListener("click", function() {
        titulo.style.color = "green";
    });

</script>
</body>
</html>
