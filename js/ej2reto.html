<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Serialización JSON</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css"
          integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh"
          crossorigin="anonymous">
    <style>

    </style>
</head>
<body class="p-4">

<h1><b>Añade un usuario</b></h1>

<div class="row">
    <div class="col-md-5">
    <form class="mb-3">
        <div class="form-group" id="formulario">
            <label for="nombre">Nombre:</label>
            <input type="text" class="form-control" id="nombre" placeholder="Introduce el nombre">

            <label for="apellidos">Apellidos:</label>
            <input type="text" class="form-control" id="apellidos" placeholder="Introduce tus apellidos">

            <label for="edad">Edad:</label>
            <input type="number" class="form-control" id="edad" placeholder="Introduce tu edad">

            <label for="ciudad">Ciudad:</label>
            <input type="text" class="form-control" id="ciudad" placeholder="Introduce tu ciudad">
        </div>
    </form>
    </div>
</div>

<button class="btn btn-primary" id="btnConsultar">Añadir Usuario</button>

<div class="col-md-7">
    <div id="resultado" class="mt-4"></div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
    let contadorFilas = 0;



    $("#btnConsultar").on("click", function () {
        const campos = [
            { id: "nombre",    label: "Nombre" },
            { id: "apellidos", label: "Apellidos" },
            { id: "edad",      label: "Edad" },
            { id: "ciudad",    label: "Ciudad" }
        ];

        for (const campo of campos) {
            if (!$("#" + campo.id).val().trim()) {
                alert("El campo " + campo.label + " es obligatorio.");
                $("#" + campo.id).focus();
                return;
            }
        }

        const persona = {
            nombre:    $("#nombre").val().trim(),
            apellidos: $("#apellidos").val().trim(),
            edad:      $("#edad").val().trim(),
            ciudad:    $("#ciudad").val().trim()
        };

        const json = JSON.stringify(persona);
        console.log("JSON serializado:", json);

        const obj = JSON.parse(json);
        console.log("Objeto deserializado:", obj);

        if ($("#tablaUsuarios").length === 0) {
            const $tabla = $("<table>")
                .attr("id", "tablaUsuarios")
                .addClass("table table-striped table-bordered table-hover");

            const $thead = $("<thead>").append(
                $("<tr>").append(
                    ["Nombre", "Apellidos", "Edad", "Ciudad"].map(texto =>
                        $("<th>").text(texto)
                    )
                )
            );

            const $tbody = $("<tbody>").attr("id", "cuerpoTabla");

            $tabla.append($thead).append($tbody);
            $("#resultado").append($tabla);
        }

        contadorFilas++;
        const idFila = "fila-" + contadorFilas;

        const $fila = $("<tr>")
            .attr("id", idFila)
            .css("cursor", "pointer")
            .attr("title", "Haz clic para eliminar esta fila")
            .on("click", function () {
                $("#" + idFila).remove();
            })
            .append(
                [obj.nombre, obj.apellidos, obj.edad, obj.ciudad].map(valor =>
                    $("<td>").text(valor)
                )
            );

        $("#cuerpoTabla").append($fila);

        $("#formulario").trigger("reset");
    });
</script>
</body>
</html>
