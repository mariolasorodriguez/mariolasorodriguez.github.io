<!DOCTYPE html>
<html>
<head>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <meta charset="utf-8">
</head>
<body>
<input type="text" id="nombre" placeholder="Nombre">
<input type="text" id="apellidos" placeholder="Apellidos">
<input type="number" id="edad" placeholder="Edad">
<input type="text" id="ciudad" placeholder="Ciudad">
<button onclick="insertar()">Añadir</button>

<table border="1">
    <thead><tr><th>Nombre</th><th>Apellidos</th><th>Edad</th><th>Ciudad</th></tr></thead>
    <tbody id="tbody"></tbody>
</table>

<script>
    function generaTr(obj) {
            return `<tr>
        <td>${obj.nombre}</td>
        <td>${obj.apellidos}</td>
        <td>${obj.edad}</td>
        <td>${obj.ciudad}</td>
      </tr>`;
    }

    function insertar() {
        let obj = {
            nombre: $("#nombre").val(),
            apellidos: $("#apellidos").val(),
            edad: $("#edad").val(),
            ciudad: $("#ciudad").val()
        };
        $("#tbody").append(generaTr(obj));
    }
</script>
</body>
</html>
