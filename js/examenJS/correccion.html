<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ahorcado</title>
    <style>
        body { font-family: Arial, Helvetica, sans-serif; background-color: #87c5a9; }
        #contenedorPrincipal {
            justify-content: center; align-items: center;
            text-align: center; display: flex;
            flex-direction: column; padding: 20px; margin: 20px;
        }
        #juego { background-color: #ffffff; width: 300px; padding: 10px; }
        #estadoJuego { background-color: #fdfdfd; color: #1f9b1b; width: 100px; }
    </style>
</head>
<body>
<div id="contenedorPrincipal">
    <h1>JUEGO DEL AHORCADO</h1>
    <div id="juego"></div>
    <p>Introduce la letra a buscar:</p>
    <input type="text" id="letraInsertada" placeholder="Letra a buscar" maxlength="1">
    <br>
    <button type="button" id="botonComprobar">Comprobar</button>
    <br>
    <button type="button" id="botonReiniciar" onclick="reiniciarPartida()">Reiniciar</button>
    <br>
    <div id="estadoJuego"></div>
</div>

<script>
    const palabras = ["papaya", "cacahuete", "esternocleidomastoideo", "pedropoleygitanomarlonamatedejavascript"];

    let palabraOculta = "";
    let arrayPalabra = [];
    let arrayGuiones = [];

    comenzarPartida();

    document.getElementById("botonComprobar").addEventListener("click", function () {
        comprobarLetra();
    });

    function comenzarPartida() {
        let numeroRandom = Math.floor(Math.random() * palabras.length);
        palabraOculta = palabras[numeroRandom];

        arrayPalabra = palabraOculta.split("");
        arrayGuiones = arrayPalabra.map(() => "_");

        actualizarDisplay();
    }

    function comprobarLetra() {
        let letraIntroducida = document.getElementById("letraInsertada").value.toLowerCase();

        if (!letraIntroducida) return;

        let encontrada = false;

        for (let i = 0; i < arrayPalabra.length; i++) {
            if (arrayPalabra[i] === letraIntroducida) {
                arrayGuiones[i] = letraIntroducida;
                encontrada = true;
            }
        }

        if (!encontrada) {
            document.getElementById("estadoJuego").textContent = "Letra no encontrada";
        } else {
            document.getElementById("estadoJuego").textContent = "";
        }

        actualizarDisplay();

        if (arrayGuiones.join("") === arrayPalabra.join("")) {
            document.getElementById("estadoJuego").textContent = "¡Ganaste!";
            bloquearBotonComprobar();
        }

        document.getElementById("letraInsertada").value = "";
    }

    function actualizarDisplay() {
        document.getElementById("juego").textContent = arrayGuiones.join(" ");
    }

    function reiniciarPartida() {
        document.getElementById("estadoJuego").textContent = "";
        desbloquearBotonComprobar();
        document.getElementById("juego").textContent = "";
        comenzarPartida();
    }

    function bloquearBotonComprobar() {
        document.getElementById("botonComprobar").disabled = true;
    }

    function desbloquearBotonComprobar() {
        document.getElementById("botonComprobar").disabled = false;
    }
</script>
</body>
</html>
