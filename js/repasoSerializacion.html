<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
</head>
<body>
<button onclick="comprobar()">▶ Ejecutar</button>
<p id="serializado"></p>
<p id="deserializado"></p>

<script>
    function serializar(obj) {
        return JSON.stringify(obj);
    }
    function deserializar(json) {
        return JSON.parse(json);
    }

    function comprobar() {
        let obj = { nombre: "Ana", apellidos: "García", edad: 20, ciudad: "Sevilla" };

        let jsonStr = serializar(obj);
        document.getElementById("serializado").textContent = jsonStr;

        let recuperado = deserializar(jsonStr);
        document.getElementById("deserializado").textContent =
            `Recuperado: nombre:${recuperado.nombre}, apellidos:${recuperado.apellidos}, edad:${recuperado.edad}, ciudad:${recuperado.ciudad}`;
    }
</script>
</body>
</html>
