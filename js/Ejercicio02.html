<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ejercicio 02</title>
</head>
<body>
    <--! Apartado 1 -->
    <div id="apartado1"></div>
    <hr>

    <--! Apartado 2 -->
    <form>
        <label for="edad">Edad:</label>
        <input type="number" id="edad" placeholder="Edad">
        <button type="button" onclick="calcular()">Calcular</button>
    </form>
    <div id="apartado2"></div>

    <--! Apartado 3 -->
    <div id="apartado3"></div>
    <script>
        // Apartado 1
        let numero = 1;
        if (numero % 2 === 0) {
            document.getElementById("apartado1").innerHTML = "<p>El número es par</p>";
        } else {
            document.getElementById("apartado1").innerHTML = "<p>El número es impar</p>";
        }

        // Apartado 2
        function calcular(){
            const edad = parseInt(document.getElementById("edad").value);

            if (edad >= 18) {
                document.getElementById("apartado2").innerHTML = "<p>Puede votar</p>";
            } else {
                document.getElementById("apartado2").innerHTML = "<p>No puede votar</p>";
            }
        }


    </script>
</body>
</html>
