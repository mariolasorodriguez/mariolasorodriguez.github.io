<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
    </style>
</head>
<body>
    <h3>Puntos Totales:</h3>
    <div id="puntos"></div>
    <h3>Cartera de puntos:</h3>
    <div id="carteradepuntos"></div>
    <h3>Partidas:</h3>
    <div id="partidas"></div>
    <br>
    <div id="estadoPartida"></div>
    <hr>
    <form>
        <label>Adivina el número del 1 al 100</label>
        <input type="number" id="numero" placeholder="Ingrese un numero del 1 al 100">
        <button type="button" id="botonVerificar">Verificar</button>
        <button type="button" id="botonReiniciar" onclick="reiniciarPartida()">Reiniciar</button>
    </form>


<script>
    // Declaramos las variables para los puntos y la cartera de puntos
    let puntos = 0;
    let carteraDePuntos = 10;
    let partidas = 0;

    // Generamos un numero aleatorio del 1 al 100
    let numeroRandom = Math.floor(Math.random() * 100) + 1;
    // Mostramos el número aleatorio en la consola para probar el juego
    console.log(numeroRandom);

    // Mostramos los puntos y la cartera de puntos
    document.getElementById("puntos").innerHTML = puntos;
    document.getElementById("carteradepuntos").innerHTML = carteraDePuntos;
    document.getElementById("partidas").innerHTML = partidas;

    let numeroUsuario;

    document.getElementById("botonVerificar").addEventListener("click", function() {
        numeroUsuario = parseInt(document.getElementById("numero").value);
        verificarNumero();
    });

    function verificarNumero() {
        if (carteraDePuntos <= 0) {
            bloquearBotonVerificar();
            document.getElementById("estadoPartida").innerHTML = "No tienes más intentos, reinicia la partida.";
            } else if (numeroRandom === numeroUsuario) {
                puntos += 10;
                carteraDePuntos = 10;
                partidas++;
                document.getElementById("partidas").innerHTML = partidas;
                document.getElementById("puntos").innerHTML = puntos;
                document.getElementById("carteradepuntos").innerHTML = carteraDePuntos;
                document.getElementById("estadoPartida").innerHTML = "¡Felicidades! Has adivinado el número.";
                bloquearBotonVerificar()
            } else {
                carteraDePuntos -= 1;
                partidas++;
                document.getElementById("partidas").innerHTML = partidas;
                document.getElementById("carteradepuntos").innerHTML = carteraDePuntos;
                let pista = numeroUsuario > numeroRandom ? "El número es MENOR." : "El número es MAYOR.";
                document.getElementById("estadoPartida").innerHTML = `Número incorrecto. ${pista} Intenta de nuevo.`;
            }
    }

    function reiniciarPartida() {
        carteraDePuntos = 10;
        desbloquearBotonVerificar();
        numeroRandom = Math.floor(Math.random() * 100) + 1;
        document.getElementById("carteradepuntos").innerHTML = carteraDePuntos;
        document.getElementById("estadoPartida").innerHTML = "Partida reiniciada. Adivina el nuevo número.";
        console.log(numeroRandom);
    }

    function bloquearBotonVerificar() {
        document.getElementById("botonVerificar").disabled = true;
    }


    function desbloquearBotonVerificar() {
        document.getElementById("botonVerificar").disabled = false;
    }
</script>
</body>
</html>
